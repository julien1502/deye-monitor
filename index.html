<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deye Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
      margin: 0;
    }
    h1 {
      margin-top: 0;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    input, button {
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #555;
    }
    input {
      min-width: 280px;
    }
    button {
      cursor: pointer;
      background: #fff;
    }
    .card {
      background: #222;
      padding: 18px;
      border-radius: 8px;
      margin-top: 14px;
      font-size: 18px;
    }
    #status {
      margin-top: 16px;
      margin-bottom: 16px;
      font-size: 20px;
    }
    #log {
      margin-top: 18px;
      white-space: pre-wrap;
      background: #1b1b1b;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #9fd3ff;
    }
  </style>
</head>
<body>
  <h1>Deye Monitor</h1>

  <div class="row">
    <input id="username" type="text" placeholder="Email Deye" />
    <input id="password" type="password" placeholder="Mot de passe Deye" />
  </div>

  <div class="row">
    <input id="appId" type="text" placeholder="App ID" />
    <input id="appSecret" type="text" placeholder="App Secret" />
  </div>

  <div class="row">
    <input id="baseUrl" type="text" value="https://eu1-developer.deyecloud.com/v1.0" />
    <input id="companyId" type="text" placeholder="Company ID (optionnel)" />
  </div>

  <div class="row">
    <button type="button" onclick="connectToDeye()">Connecter</button>
  </div>

  <div id="status">Déconnecté</div>

  <div class="card">Puissance : <span id="power">--</span></div>
  <div class="card">Énergie jour : <span id="energy">--</span></div>

  <div id="log"></div>

  <script>
    let token = null;
    let deviceId = null;
    let refreshTimer = null;

    function api() {
      return window.location.origin + "/api/auth";
    }

    function log(msg, obj) {
      const el = document.getElementById("log");
      if (obj !== undefined) {
        el.textContent = msg + "\n" + JSON.stringify(obj, null, 2);
      } else {
        el.textContent = msg;
      }
      console.log(msg, obj ?? "");
    }

    function getForm() {
      return {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
        appId: document.getElementById("appId").value.trim(),
        appSecret: document.getElementById("appSecret").value.trim(),
        baseUrl: document.getElementById("baseUrl").value.trim().replace(/\/$/, ""),
        companyId: document.getElementById("companyId").value.trim()
      };
    }

    async function connectToDeye() {
      try {
        const f = getForm();

        if (!f.username || !f.password || !f.appId || !f.appSecret || !f.baseUrl) {
          document.getElementById("status").textContent = "Merci de remplir tous les champs obligatoires";
          return;
        }

        document.getElementById("status").textContent = "Connexion...";
        log("Début connexion");

        const loginRes = await fetch(api(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "login",
            ...f
          })
        });

        const loginData = await loginRes.json().catch(() => null);
        log("LOGIN", loginData);

        if (!loginRes.ok || !loginData?.response?.accessToken) {
          document.getElementById("status").textContent = "Échec login";
          return;
        }

        token = loginData.response.accessToken;

        document.getElementById("status").textContent = "Récupération des appareils...";

        const devRes = await fetch(api(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "devices",
            token,
            ...f
          })
        });

        const devData = await devRes.json().catch(() => null);
        log("DEVICES", devData);

        const stations = devData?.response?.stationList || [];
        const allDevices = stations.flatMap(station =>
          (station.deviceListItems || []).map(device => ({
            ...device,
            stationName: station.name
          }))
        );

        log("ALL DEVICES", allDevices);

        const inverter =
          allDevices.find(d => d.deviceType === "INVERTER" && d.stationName !== "This is a demo") ||
          allDevices.find(d => d.deviceType === "INVERTER") ||
          null;

        if (!inverter) {
          document.getElementById("status").textContent = "Aucun onduleur trouvé";
          return;
        }

        deviceId = inverter.deviceId;
        document.getElementById("status").textContent =
          "Connecté à " + inverter.stationName + " - INVERTER (" + inverter.deviceId + ")";

        if (refreshTimer) clearInterval(refreshTimer);
        await fetchData();
        refreshTimer = setInterval(fetchData, 30000);

      } catch (e) {
        console.error(e);
        document.getElementById("status").textContent = "Erreur connexion: " + e.message;
        log("ERREUR CONNEXION", { message: e.message, stack: e.stack });
      }
    }

   async function fetchData() {
  try {
    const f = getForm();

    if (!token || !deviceId) return;

    const res = await fetch(api(), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "realtime",
        token,
        deviceId,
        ...f
      })
    });

    const realtimeData = await res.json().catch(() => null);
    log("REALTIME", realtimeData);

    if (!res.ok) {
      document.getElementById("status").textContent = "Erreur temps réel";
      return;
    }

    const raw =
      realtimeData?.response?.data?.[0] ||
      realtimeData?.response?.data ||
      realtimeData?.response ||
      null;

    if (!raw) {
      document.getElementById("status").textContent = "Pas de données temps réel";
      return;
    }

    const power =
      raw.activePower ??
      raw.outputPower ??
      raw.pac ??
      raw.powerAC ??
      0;

    const energy =
      raw.dayEnergy ??
      raw.energyToday ??
      raw.eday ??
      0;

    document.getElementById("power").textContent = power + " W";
    document.getElementById("energy").textContent = energy + " kWh";
  } catch (e) {
    console.error(e);
    document.getElementById("status").textContent = "Erreur fetchData: " + e.message;
    log("ERREUR FETCHDATA", { message: e.message, stack: e.stack });
  }
}
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deye Monitor</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #eee;
    padding: 20px;
}
input, button {
    margin: 5px;
    padding: 10px;
}
.card {
    background: #222;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
}
</style>
</head>

<body>

<h2>Deye Monitor</h2>

<input id="username" placeholder="Email">
<input id="password" placeholder="Mot de passe" type="password"><br>

<input id="appId" placeholder="App ID">
<input id="appSecret" placeholder="App Secret"><br>

<input id="baseUrl" value="https://eu1-developer.deyecloud.com/v1.0"><br>

<button onclick="connect()">Connecter</button>

<div id="status"></div>

<div class="card">Puissance: <span id="power">--</span></div>
<div class="card">Energie jour: <span id="energy">--</span></div>

<script>

let token = null;
let deviceId = null;

function api() {
    return window.location.origin + "/api/auth";
}

function getForm() {
    return {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        appId: document.getElementById("appId").value,
        appSecret: document.getElementById("appSecret").value,
        baseUrl: document.getElementById("baseUrl").value
    };
}

async function connect() {

    const f = getForm();

    document.getElementById("status").innerText = "Connexion...";

    // LOGIN
    const login = await fetch(api(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "login",
            ...f
        })
    });

    const loginData = await login.json();
    console.log("LOGIN", loginData);

    token = loginData.response.accessToken;

    // DEVICES
    const dev = await fetch(api(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "devices",
            token,
            ...f
        })
    });

    const devData = await dev.json();
    console.log("DEVICES", devData);

    const stations = devData.response.stationList;

    const devices = stations.flatMap(s =>
        s.deviceListItems.map(d => ({
            ...d,
            stationName: s.name
        }))
    );

    console.log("ALL DEVICES", devices);

    const inverter =
        devices.find(d => d.deviceType === "INVERTER" && d.stationName !== "This is a demo")
        || devices.find(d => d.deviceType === "INVERTER");

    deviceId = inverter.deviceId;

    document.getElementById("status").innerText =
        "Connecté à " + inverter.stationName;

    fetchData();
    setInterval(fetchData, 10000);
}

async function fetchData() {

    const f = getForm();

    const res = await fetch(api(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "realtime",
            token,
            deviceId,
            ...f
        })
    });

    const data = await res.json();
    console.log("REALTIME", data);

    const raw = data.response?.data?.[0] || data.response?.data;

    if (!raw) return;

    // Mapping simple (à adapter si besoin)
    const power =
        raw.activePower ||
        raw.outputPower ||
        raw.pac ||
        0;

    const energy =
        raw.dayEnergy ||
        raw.energyToday ||
        raw.eday ||
        0;

    document.getElementById("power").innerText = power + " W";
    document.getElementById("energy").innerText = energy + " kWh";
}

</script>

</body>
</html>

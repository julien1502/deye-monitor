<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Deye Monitor</title>

<style>
body { background:#111; color:#eee; font-family:Arial; padding:20px; }
input, button { padding:10px; margin:5px; }
.card { background:#222; padding:15px; margin-top:10px; }
#log { white-space:pre-wrap; font-size:12px; color:#8cf; }
</style>
</head>

<body>

<h2>Deye Monitor</h2>

<input id="username" placeholder="email">
<input id="password" type="password" placeholder="password"><br>

<input id="appId" placeholder="appId">
<input id="appSecret" placeholder="appSecret"><br>

<input id="baseUrl" value="https://eu1-developer.deyecloud.com/v1.0"><br>

<button onclick="connect()">Connecter</button>

<h3 id="status">Déconnecté</h3>

<div class="card">Puissance : <span id="power">--</span></div>
<div class="card">Energie jour : <span id="energy">--</span></div>

<div id="log"></div>

<script>
let token = null;
let deviceId = null;
let stationId = null;

function api() {
  return location.origin + "/api/auth";
}

function log(t, d) {
  document.getElementById("log").textContent =
    t + "\n" + JSON.stringify(d, null, 2);
}

function getForm() {
  return {
    username: username.value,
    password: password.value,
    appId: appId.value,
    appSecret: appSecret.value,
    baseUrl: baseUrl.value
  };
}

async function connect() {
  const f = getForm();

  status.innerText = "Connexion...";

  // LOGIN
  const login = await fetch(api(), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action:"login", ...f })
  });

  const loginData = await login.json();
  log("LOGIN", loginData);

  if (!loginData?.response?.accessToken) {
    status.innerText = "Login failed";
    return;
  }

  token = loginData.response.accessToken;

  // DEVICES
  const dev = await fetch(api(), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action:"devices", token, ...f })
  });

  const devData = await dev.json();
  log("DEVICES", devData);

  const stations = devData.response.stationList;

  const devices = stations.flatMap(s =>
    s.deviceListItems.map(d => ({
      ...d,
      stationName: s.name
    }))
  );

  const inverter =
    devices.find(d => d.deviceType === "INVERTER" && d.stationName !== "This is a demo")
    || devices.find(d => d.deviceType === "INVERTER");

  deviceId = inverter.deviceId;
  stationId = inverter.stationId;

  status.innerText = "Connecté à " + inverter.stationName;

  fetchData();
  setInterval(fetchData, 10000);
}

async function fetchData() {

  const f = getForm();

  const res = await fetch(api(), {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"realtime",
      token,
      deviceId,
      stationId,
      ...f
    })
  });

  const data = await res.json();
  log("REALTIME", data);

  const raw = data?.response?.data;

  if (!raw) return;

  const power = raw.pac ?? raw.power ?? 0;
  const energy = raw.eday ?? raw.energy ?? 0;

  powerEl.innerText = power + " W";
  energyEl.innerText = energy + " kWh";
}
</script>

</body>
</html>

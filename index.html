<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deye Monitor</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-top: 0;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, button {
      padding: 10px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #555;
    }

    input {
      min-width: 260px;
      background: #1b1b1b;
      color: #eee;
    }

    button {
      cursor: pointer;
      background: #4ade80;
      color: #111;
      border: none;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.95;
    }

    .status {
      margin: 18px 0;
      font-size: 18px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 15px;
    }

    .card {
      background: #222;
      border-radius: 8px;
      padding: 16px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    #log {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #1b1b1b;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #8fd3ff;
    }
  </style>
</head>
<body>
  <h1>Deye Monitor</h1>

  <div class="row">
    <input id="username" type="text" placeholder="Email Deye" />
    <input id="password" type="password" placeholder="Mot de passe Deye" />
  </div>

  <div class="row">
    <input id="appId" type="text" placeholder="App ID" />
    <input id="appSecret" type="text" placeholder="App Secret" />
  </div>

  <div class="row">
    <input id="baseUrl" type="text" value="https://eu1-developer.deyecloud.com/v1.0" />
    <input id="companyId" type="text" placeholder="Company ID (optionnel)" />
  </div>

  <div class="row">
    <button type="button" onclick="connectToDeye()">Connecter</button>
  </div>

  <div id="status" class="status">Déconnecté</div>

  <div class="grid">
    <div class="card">
      <div class="label">Production solaire</div>
      <div class="value" id="generationPower">--</div>
    </div>

    <div class="card">
      <div class="label">Consommation maison</div>
      <div class="value" id="consumptionPower">--</div>
    </div>

    <div class="card">
      <div class="label">Puissance batterie</div>
      <div class="value" id="batteryPower">--</div>
    </div>

    <div class="card">
      <div class="label">SOC batterie</div>
      <div class="value" id="batterySOC">--</div>
    </div>

    <div class="card">
      <div class="label">Wire power</div>
      <div class="value" id="wirePower">--</div>
    </div>

    <div class="card">
      <div class="label">Dernière mise à jour</div>
      <div class="value" id="lastUpdate" style="font-size:18px;">--</div>
    </div>
  </div>

  <div id="log"></div>

  <script>
    let token = null;
    let stationId = null;
    let refreshTimer = null;

    function api() {
      return window.location.origin + "/api/auth";
    }

    function log(title, data) {
      const el = document.getElementById("log");
      el.textContent = title + "\n" + JSON.stringify(data, null, 2);
      console.log(title, data);
    }

    function getForm() {
      return {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
        appId: document.getElementById("appId").value.trim(),
        appSecret: document.getElementById("appSecret").value.trim(),
        baseUrl: document.getElementById("baseUrl").value.trim().replace(/\/$/, ""),
        companyId: document.getElementById("companyId").value.trim(),
      };
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function updateUI(raw) {
      document.getElementById("generationPower").textContent = (raw.generationPower ?? 0) + " W";
      document.getElementById("consumptionPower").textContent = (raw.consumptionPower ?? 0) + " W";
      document.getElementById("batteryPower").textContent = (raw.batteryPower ?? 0) + " W";
      document.getElementById("batterySOC").textContent = (raw.batterySOC ?? 0) + " %";
      document.getElementById("wirePower").textContent = (raw.wirePower ?? 0) + " W";

      if (raw.lastUpdateTime) {
        const d = new Date(raw.lastUpdateTime * 1000);
        document.getElementById("lastUpdate").textContent = d.toLocaleString("fr-FR");
      } else {
        document.getElementById("lastUpdate").textContent = "--";
      }
    }

    async function connectToDeye() {
      try {
        const f = getForm();

        if (!f.username || !f.password || !f.appId || !f.appSecret || !f.baseUrl) {
          setStatus("Merci de remplir tous les champs obligatoires");
          return;
        }

        setStatus("Connexion...");
        log("INFO", { step: "login" });

        const loginRes = await fetch(api(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "login",
            ...f
          })
        });

        const loginData = await loginRes.json().catch(() => null);
        log("LOGIN", loginData);

        if (!loginRes.ok || !loginData?.response?.accessToken) {
          setStatus("Échec login");
          return;
        }

        token = loginData.response.accessToken;

        setStatus("Récupération des appareils...");

        const devRes = await fetch(api(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "devices",
            token,
            ...f
          })
        });

        const devData = await devRes.json().catch(() => null);
        log("DEVICES", devData);

        const stations = devData?.response?.stationList || [];

        const allDevices = stations.flatMap(station =>
          (station.deviceListItems || []).map(device => ({
            ...device,
            stationName: station.name
          }))
        );

        const inverter =
          allDevices.find(d => d.deviceType === "INVERTER" && d.stationName !== "This is a demo") ||
          allDevices.find(d => d.deviceType === "INVERTER") ||
          null;

        if (!inverter) {
          setStatus("Aucun onduleur trouvé");
          return;
        }

        stationId = inverter.stationId;

        setStatus(`Connecté à ${inverter.stationName}`);

        if (refreshTimer) {
          clearInterval(refreshTimer);
        }

        await fetchData();
        refreshTimer = setInterval(fetchData, 10000);

      } catch (e) {
        setStatus("Erreur connexion: " + e.message);
        log("ERREUR CONNEXION", {
          message: e.message,
          stack: e.stack
        });
      }
    }

    async function fetchData() {
      try {
        const f = getForm();

        if (!token || !stationId) {
          return;
        }

        const res = await fetch(api(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "realtime",
            token,
            stationId,
            ...f
          })
        });

        const data = await res.json().catch(() => null);
        log("REALTIME", data);

        if (!res.ok || !data?.response?.success) {
          setStatus("Erreur temps réel");
          return;
        }

        updateUI(data.response);
      } catch (e) {
        setStatus("Erreur temps réel: " + e.message);
        log("ERREUR REALTIME", {
          message: e.message,
          stack: e.stack
        });
      }
    }
  </script>
</body>
</html>
